<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizer</title>
    <style>
        table td {
            border: 1px solid rgb(0, 0, 0);
            padding: 10px;
        }
    </style>
    <script src="script.js" defer></script>
</head>
    <body>
        <table id="table" style="border: 2px solid rgb(0, 0, 0); border-collapse: collapse;">
        
        </table>
        <p>Length:</p> 
        <input type="text" id="LengthInput">
        <p>Width:</p>
        <input type="text" id="WidthInput">
        <p>Start x value</p>
        <input type="text" id="StartXInput">
        <p>Start y value</p>
        <input type="text" id="StartYInput">
        <p>Target x value</p>
        <input type="text" id="TargetXInput">
        <p>Target y value</p>
        <input type="text" id="TargetYInput">
        <div id="wallInput">
            <button id="addWallsButton">Add Walls</button>
        </div>
        <button id="submitButton">Submit</button>
        
    </body>
</html>
